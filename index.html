<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPTI | 职场第二人格索引</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --bg: #ffffff; --main-text: #000000; --sub-text: #999999; --border: #f2f2f2; }
        body { font-family: "PingFang SC", "STHeiti", sans-serif; background-color: #fcfcfc; margin: 0; display: flex; justify-content: center; color: var(--main-text); -webkit-font-smoothing: antialiased; }
        #app { width: 100%; max-width: 600px; background: var(--bg); min-height: 100vh; position: relative; }
        .hidden { display: none !important; }

        /* --- 封面 --- */
        .cover-page { text-align: center; padding: 180px 40px 40px; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; }
        .cover-page h1 { font-size: 5rem; letter-spacing: 15px; margin: 0; font-weight: 200; }
        .cover-page h2 { font-size: 1.1rem; font-weight: 400; margin: 25px 0; letter-spacing: 2px; }
        .btn-start { margin-top: 60px; background: #000; color: #fff; border: none; padding: 15px 60px; letter-spacing: 5px; cursor: pointer; font-size: 0.9rem; }
        .cover-footer { margin-top: auto; font-size: 0.7rem; color: #ddd; letter-spacing: 5px; text-transform: uppercase; padding-bottom: 40px; }

        /* --- 测试页 --- */
        .quiz-header { padding: 30px 40px; border-bottom: 1px solid var(--border); font-size: 0.8rem; color: #ccc; letter-spacing: 2px; }
        .quiz-content { padding: 60px 40px; }
        .quiz-label { display: inline-block; background: #000; color: #fff; padding: 4px 10px; font-size: 0.7rem; margin-bottom: 35px; }
        .quiz-content h3 { font-size: 1.3rem; line-height: 1.7; margin-bottom: 50px; font-weight: 500; }
        .option-item { border: 1px solid var(--border); padding: 22px; margin-bottom: 15px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .option-item:hover { border-color: #000; background: #fafafa; }
        .opt-letter { font-weight: bold; color: #eee; margin-right: 25px; font-size: 1.2rem; }
        .opt-text { font-size: 0.95rem; color: #333; line-height: 1.6; }

        /* --- 结果页 --- */
        .result-page { padding: 60px 40px; background: #fff; }
        .res-title-group { text-align: center; margin-bottom: 50px; }
        .res-title-group h2 { font-size: 2.4rem; margin: 0; letter-spacing: 10px; font-weight: 600; }
        .res-title-group p { font-size: 0.8rem; color: #bbb; letter-spacing: 4px; margin-top: 12px; }
        
        /* 图片占位骨架屏动画 */
        .img-box { width: 100%; margin: 40px 0; border: 1px solid #f9f9f9; background: #fdfdfd; min-height: 300px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #res-img { width: 100%; display: block; }
        
        .res-section { margin-bottom: 50px; }
        .res-label { background: #000; color: #fff; display: inline-block; padding: 5px 15px; font-size: 0.75rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 25px; }
        .res-text { font-size: 1rem; line-height: 1.9; color: #333; text-align: justify; white-space: pre-line; }
        .res-history-box { background: #f8f8f8; padding: 25px; margin-top: 10px; }
        .dynamics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .dynamic-card { background: #fff; border: 1px solid #eee; padding: 20px; text-align: center; }
        .dynamic-card span { font-size: 0.7rem; color: #bbb; display: block; margin-bottom: 10px; }
        .dynamic-card b { font-size: 1rem; color: #000; }
        
        .btn-group { padding: 0 40px 80px; text-align: center; }
        .btn-share { width: 100%; padding: 20px; background: #000; color: #fff; border: none; cursor: pointer; letter-spacing: 3px; font-weight: bold; margin-bottom: 20px; font-size: 0.9rem; }

        /* 手机端预览遮罩 */
        #preview-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #preview-image { width: 85%; max-height: 80%; object-fit: contain; border: 5px solid #fff; }
        .preview-tip { color: #fff; margin-top: 20px; font-size: 0.9rem; letter-spacing: 2px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="page-cover" class="cover-page">
        <h1>DPTI</h1>
        <h2>职场第二人格 | 阴暗原型索引</h2>
        <div><button class="btn-start" onclick="startTest()">开启推演</button></div>
        <div class="cover-footer">Y.Y. ARCHIVE</div>
    </div>

    <div id="page-quiz" class="hidden">
        <div class="quiz-header">DPTI // PHASE <b id="progress-num">01</b></div>
        <div class="quiz-content">
            <div class="quiz-label" id="quiz-tag">ARCHIVE LOADING</div>
            <h3 id="question-text"></h3>
            <div id="options-box"></div>
        </div>
    </div>

    <div id="page-result" class="hidden">
        <div id="capture-area" class="result-page">
            <div class="res-title-group"><h2 id="res-name"></h2><p id="res-ename">ARCHETYPE INDEX</p></div>
            <div class="img-box"><img id="res-img" src="" crossorigin="anonymous"></div>
            <div class="res-section">
                <div class="res-label">维度侧写 / PROFILING</div>
                <p class="res-text" id="res-core"></p>
            </div>
            <div class="res-section">
                <div class="res-label">职场关系 / DYNAMICS</div>
                <div class="dynamics-grid">
                    <div class="dynamic-card"><span>完美合伙人</span><b id="res-partner"></b></div>
                    <div class="dynamic-card"><span>职场天敌</span><b id="res-enemy"></b></div>
                </div>
            </div>
            <p style="text-align:center; font-size:0.6rem; color:#f0f0f0; letter-spacing:4px; margin-top:50px;">Y.Y. ARCHIVE // DPTI REPORT</p>
        </div>
        <div class="btn-group">
            <button class="btn-share" onclick="saveReport()">存取推演报告 (IMAGE)</button>
            <button style="width:100%; background:none; border:none; color:#ccc; margin-top:20px;" onclick="location.reload()">重新存取档案</button>
        </div>
    </div>
</div>

<div id="preview-overlay" onclick="this.style.display='none'">
    <img id="preview-image" src="">
    <p class="preview-tip">↑ 长按图片保存到相册</p>
</div>

<script>
    const DPTI_DB = {
        "01": { name: "黑天鹅", ename: "BLACK SWAN", img: "assets/swan.png", core: "擅长高屋建瓴与掌握权力，具备强大的领袖气质和掌控力。在职场暗流中，如同优雅掠过的黑天鹅，不露声色却能精准锁定目标。", partner: "幕后推手", enemy: "野心家" },
        "02": { name: "野心家", ename: "THE PREDATOR", img: "assets/predator.png", core: "极强的领地意识与进攻性，不达目的誓不罢休。你是职场中的掠食者，对机会有着野兽般的嗅觉。", partner: "计算器", enemy: "黑天鹅" },
        "03": { name: "幕后推手", ename: "THE ARCHITECT", img: "assets/architect.png", core: "隐身于规则背后的操盘手。你不需要站在光里，但光照向哪里由你决定。", partner: "黑天鹅", enemy: "独行侠" },
        "04": { name: "剔骨刀", ename: "THE SHARPENER", img: "assets/sharpener.png", core: "效率的极端追求者，精准剔除系统中的冗余。你追求逻辑的纯粹，不容忍任何感性的干扰。", partner: "计算器", enemy: "调停人" },
        "05": { name: "独行侠", ename: "THE MAVERICK", img: "assets/maverick.png", core: "游离于体制外的天才，用创造力改写规则。你无法被驯服，因为你本身就是新规则的制定者。", partner: "变色龙", enemy: "护城河" },
        "06": { name: "计算器", ename: "THE QUANT", img: "assets/quant.png", core: "将职场量化为数据与概率的理性机器。你从不相信运气，你只相信计算后的必然。", partner: "剔骨刀", enemy: "变色龙" },
        "07": { name: "护城河", ename: "THE FORTRESS", img: "assets/fortress.png", core: "守序阵营的定海神针。不论外部环境如何动荡，只要你在，基本盘就不会崩塌。", partner: "调停人", enemy: "独行侠" },
        "08": { name: "变色龙", ename: "THE PRISM", img: "assets/prism.png", core: "完美的社交伪装者。你能根据任何环境色调整频率，让所有人感到舒适。", partner: "独行侠", enemy: "计算器" },
        "09": { name: "调停人", ename: "THE MEDIATOR", img: "assets/mediator.png", core: "平衡各方利益的博弈专家。你擅长在冲突中寻找最大公约数，用温和的手段达成目标。", partner: "护城河", enemy: "剔骨刀" }
    };

    const quizData = [
        { tag: "领地", q: "会议室有四个位子，你坐哪？", options: [{ t: "高光位", l: "A", w: 5 }, { t: "观察位", l: "B", w: 0 }] }
        // ... 此处请补全你所有的 9 道题 ...
    ];

    let currentStep = 0; let totalScore = 0;

    // --- 【新增】预加载逻辑 ---
    function preloadImages() {
        Object.values(DPTI_DB).forEach(d => {
            const img = new Image();
            img.src = d.img; 
        });
    }
    preloadImages(); // 页面加载即开始静默下载所有图片

    function startTest() {
        document.getElementById('page-cover').classList.add('hidden');
        document.getElementById('page-quiz').classList.remove('hidden');
        renderQuiz();
    }

    function renderQuiz() {
        const item = quizData[currentStep];
        document.getElementById('progress-num').innerText = (currentStep + 1).toString().padStart(2, '0');
        document.getElementById('question-text').innerText = item.q;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        item.options.forEach(opt => {
            const div = document.createElement('div');
            div.className = "option-item";
            div.innerHTML = `<span class="opt-letter">${opt.l}</span><span class="opt-text">${opt.t}</span>`;
            div.onclick = () => {
                totalScore += opt.w;
                currentStep++;
                if(currentStep < quizData.length) renderQuiz(); else finalize();
            };
            box.appendChild(div);
        });
    }

    function finalize() {
        const id = totalScore >= 5 ? "01" : "08"; // 示例计算
        const d = DPTI_DB[id];
        document.getElementById('res-name').innerText = d.name;
        document.getElementById('res-ename').innerText = d.ename;
        
        // 关键：这里直接赋值，因为图片可能已经被预加载好了
        document.getElementById('res-img').src = d.img;
        
        document.getElementById('res-core').innerText = d.core;
        document.getElementById('res-partner').innerText = d.partner;
        document.getElementById('res-enemy').innerText = d.enemy;

        document.getElementById('page-quiz').classList.add('hidden');
        document.getElementById('page-result').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function saveReport() {
        const btn = document.querySelector('.btn-share');
        btn.innerText = "同步档案中...";
        html2canvas(document.getElementById('capture-area'), { useCORS: true, scale: 2 }).then(canvas => {
            document.getElementById('preview-image').src = canvas.toDataURL("image/png");
            document.getElementById('preview-overlay').style.display = 'flex';
            btn.innerText = "存取推演报告 (IMAGE)";
        });
    }
</script>
</body>
</html>
