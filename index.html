<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPTI | 职场第二人格索引</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #ffffff; --main-text: #000000; --sub-text: #999999; --border: #f2f2f2; --accent: #ff3b30; }
        body { font-family: "PingFang SC", "STHeiti", sans-serif; background-color: #fcfcfc; margin: 0; display: flex; justify-content: center; color: var(--main-text); -webkit-font-smoothing: antialiased; overflow-x: hidden;}
        #app { width: 100%; max-width: 600px; background: var(--bg); min-height: 100vh; position: relative; }
        .hidden { display: none !important; }

        /* --- 封面样式 --- */
        .cover-page { text-align: center; padding: 180px 40px 40px; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; }
        .cover-page h1 { font-size: 5rem; letter-spacing: 15px; margin: 0; font-weight: 200; animation: tracking-in-expand 0.7s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;}
        .cover-page h2 { font-size: 1.1rem; font-weight: 400; margin: 25px 0; letter-spacing: 2px; color: #333;}
        .btn-start { margin-top: 60px; background: #000; color: #fff; border: none; padding: 18px 60px; letter-spacing: 5px; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
        .btn-start:active { transform: scale(0.95); background: #333; }
        .cover-footer { margin-top: auto; font-size: 0.7rem; color: #ddd; letter-spacing: 5px; text-transform: uppercase; padding-bottom: 40px; }

        /* --- 测试页样式 --- */
        .quiz-header { padding: 30px 40px; border-bottom: 1px solid var(--border); font-size: 0.8rem; color: #ccc; letter-spacing: 2px; display: flex; justify-content: space-between; align-items: center;}
        .quiz-header b { color: #000; font-size: 1.2rem; }
        .quiz-content { padding: 60px 40px; }
        .quiz-label { display: inline-block; background: #000; color: #fff; padding: 4px 12px; font-size: 0.75rem; margin-bottom: 35px; letter-spacing: 1px; font-weight: bold;}
        .quiz-content h3 { font-size: 1.3rem; line-height: 1.7; margin-bottom: 50px; font-weight: 500; text-align: justify;}
        .option-item { border: 1px solid var(--border); padding: 22px; margin-bottom: 18px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; background: #fff;}
        .option-item:active { border-color: #000; background: #f9f9f9; transform: translateY(1px);}
        .opt-letter { font-weight: bold; color: #eee; margin-right: 25px; font-size: 1.3rem; transition: 0.2s;}
        .option-item:active .opt-letter { color: #ccc; }
        .opt-text { font-size: 1rem; color: #333; line-height: 1.6; text-align: justify;}

        /* --- 结果页样式（截图区域） --- */
        .result-page { padding: 50px 40px; background: #fff; position: relative;}
        .res-header { text-align: center; margin-bottom: 40px; border-bottom: 2px solid #000; padding-bottom: 30px;}
        .res-header h2 { font-size: 2.8rem; margin: 0; letter-spacing: 12px; font-weight: 700; text-transform: uppercase;}
        .res-header p { font-size: 0.9rem; color: #666; letter-spacing: 4px; margin-top: 10px; text-transform: uppercase;}
        
        /* 雷达图容器 */
        .chart-box { width: 100%; margin: 30px 0; padding: 20px; box-sizing: border-box; background: #fafafa; border-radius: 4px;}
        #myChart { width: 100% !important; height: auto !important; }

        .res-section { margin-bottom: 45px; position: relative;}
        .res-label { background: #000; color: #fff; display: inline-block; padding: 6px 15px; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 20px;}
        .res-text { font-size: 1rem; line-height: 1.9; color: #333; text-align: justify; white-space: pre-line; margin: 0;}
        
        .dark-index-box { position: absolute; top: 0; right: 0; text-align: right; }
        .dark-index-title { font-size: 0.6rem; color: #999; letter-spacing: 1px;}
        .dark-index-val { font-size: 2rem; font-weight: bold; color: var(--accent); line-height: 1;}

        .dynamics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .dynamic-card { background: #fcfcfc; border: 1px solid #eee; padding: 20px; text-align: center; }
        .dynamic-card span { font-size: 0.7rem; color: #bbb; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .dynamic-card b { font-size: 1.1rem; color: #000; font-weight: 600;}

        /* 底部交互按钮 */
        .btn-group { padding: 0 40px 80px; text-align: center; }
        .btn-share { width: 100%; padding: 20px; background: #000; color: #fff; border: none; cursor: pointer; letter-spacing: 3px; font-weight: bold; margin-bottom: 20px; font-size: 1rem; transition: 0.3s;}
        .btn-share:active { background: #333; transform: scale(0.98);}
        .btn-restart { width: 100%; padding: 15px; background: none; border: 1px solid #eee; color: #aaa; cursor: pointer; letter-spacing: 2px; font-size: 0.85rem;}

        /* --- 智能预览遮罩层 --- */
        #preview-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #preview-image { width: 85%; max-height: 80%; object-fit: contain; border: 5px solid #fff; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .preview-tip { color: #fff; margin-top: 20px; font-size: 0.9rem; letter-spacing: 2px; font-weight: bold; text-align: center; line-height: 1.6; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 2.5rem; cursor: pointer; padding: 10px; line-height: 1;}

        /* 动画 */
        @keyframes tracking-in-expand { 0% { letter-spacing: -0.5em; opacity: 0; } 40% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <div id="page-cover" class="cover-page">

            <div class="res-section">

                    <div class="dynamic-card"><span>职场天敌</span><b id="res-enemy"></b></div>
                </div>
            </div>
            
            <p style="text-align:center; font-size:0.6rem; color:#f0f0f0; letter-spacing:4px; margin-top:50px;">Y.Y. ARCHIVE // DPTI-1.1</p>
        </div>
        
        <div class="btn-group">
            <button class="btn-share" onclick="saveReport()">存取推演报告 (IMAGE)</button>
            <button class="btn-restart" onclick="location.reload()">重新开启档案</button>
        </div>
    </div>
</div>

            { t: "顺杆而上：回复“当然”，但在输入时你已经在思考如何利用这段旧情为自己攫取新权力。", l: "A", w: {心智:3, 能量:2, 规则:-1} },
            { t: "彻底切割：从此之后，她只是你向上爬的资源，或是你必须防范的假想敌。", l: "B", w: {心智:2, 能量:-2, 规则:1} },
            { t: "强烈反胃：这种背叛感让你想吐，你已经开始物色下一个比她更强的主子。", l: "C", w: {心智:-1, 能量:1, 规则:-1} },
            { t: "甚至欣慰：真心地为她高兴，并准备好在接下来的工作中为她挡掉所有的明枪暗箭。", l: "D", w: {心智:-3, 能量:-2, 规则:2} }
        ]},
        { tag: "欲望的背叛", q: "竞争对手私下联系你，只要你能在竞标中“不小心”发错一个文件，就给你这辈子都赚不到的巨额佣金。你会？", options: [
            { t: "极限博弈：回复对方说这点钱不够，你想要的是对方公司的一个合伙人席位。", l: "A", w: {心智:3, 能量:2, 规则:-2} },
            { t: "职业洁癖：这种低智商的诱惑是对你顶级玩家身份的侮辱，你反手就把他举报了。", l: "B", w: {心智:2, 能量:-1, 规则:2} },
            { t: "毫无底线：忠诚只是因为背叛的筹码不够。现在筹码够了，你可以演得像个英雄。", l: "C", w: {心智:-2, 能量:3, 规则:-3} },
            { t: "胆怯的贪婪：你不敢做，但接下来的每一秒你都在为错过了这笔钱而深深懊悔。", l: "D", w: {心智:0, 能量:-2, 规则:2} }
        ]},
        { tag: "虚无的价值", q: "深夜在空旷的写字楼里修PPT，看着窗外灯火，你思考如果你现在从这里“消失”能换多少赔偿金。此时你想？", options: [
            { t: "以后我要让这个写字楼里所有人陪我一起熬夜，感受这种被权力主宰的滋味。", l: "A", w: {心智:-1, 能量:3, 规则:2} },
            { t: "冷眼观测：这满地的工蚁中，谁最适合做我下一场博弈的牺牲品？", l: "B", w: {心智:3, 能量:-1, 规则:0} },
            { t: "彻底厌世：想用这一生的“缺席”来报复这个吃人的体制。", l: "C", w: {心智:-3, 能量:2, 规则:-3} },
            { t: "实用至上：如果这一跳能赔给家里 200 万，那这可能是我这辈子最值的一笔买卖。", l: "D", w: {心智:2, 能量:-2, 规则:2} }
        ]},
        { tag: "杀掉那个天真", q: "如果能穿越回领入职礼包的那天，亲手杀掉那个相信“努力就有回报”的自己，你会选在哪个瞬间？", options: [
            { t: "在她第一次因为项目荣誉熬通宵、却被领导致谢词里抹去名字的时刻。", l: "A", w: {心智:3, 能量:-1, 规则:1} },
            { t: "在她第一次领到微薄薪水，还舍得给全组买下午茶分享快乐的时刻。", l: "B", w: {心智:-2, 能量:2, 规则:-1} },
            { t: "在她第一次天真地对 HR 说出“我热爱这份工作”的时刻。", l: "C", w: {心智:2, 能量:-2, 规则:1} },
            { t: "就在此时此刻，让她彻底消失在这一场漫长且绝望的权力推演里。", l: "D", w: {心智:1, 能量:1, 规则:-2} }
        ]},
        { tag: "博弈的残忍", q: "项目出大祸，你明明有办法止损，但如果不止损，你最讨厌的那个竞争对手就会被当场开除。你会？", options: [
            { t: "借刀杀人：假装努力止损但“功亏一篑”，微笑着目送他收拾东西滚蛋。", l: "A", w: {心智:3, 能量:1, 规则:-2} },
            { t: "绝对理性：为了全局利益救他一命，但从此让他欠下你一辈子还不起的债。", l: "B", w: {心智:2, 能量:-1, 规则:2} },
            { t: "看着他死：牺牲公司的利益去换取私仇的快感，这笔账在你心里很划算。", l: "C", w: {心智:-2, 能量:3, 规则:-3} },
            { t: "惊慌失措：因为害怕承担责任而陷入瘫痪，只能眼睁睁看着一切滑向深渊。", l: "D", w: {心智:-2, 能量:-3, 规则:2} }
        ]},
        { tag: "权力的代价", q: "当你终于坐进独立的办公室，看着外面那些战战兢兢、为了生计向你低头的下属。你的情绪是？", options: [
            { t: "征服的快感：这就是你牺牲了所有社交、情感和良知才换回来的战利品。", l: "A", w: {心智:-2, 能量:3, 规则:2} },
            { t: "极度的清醒：这种孤独是效率的勋章，弱者才需要所谓的“团队温情”。", l: "B", w: {心智:3, 能量:-1, 规则:1} },
            { t: "某种虚无：你虽然成了主宰者，但发现自己也不过是更高一级权力的囚徒。", l: "C", w: {心智:1, 能量:2, 规则:-2} },
            { t: "假装和蔼：为了更方便地收割他们的价值，你披上了一层名为“导师”的伪善外衣。", l: "D", w: {心智:2, 能量:1, 规则:-1} }
        ]}
    ];

    let currentStep = 0;
    let scores = { 心智: 0, 能量: 0, 规则: 0 };
    let myRadarChart = null; // 存储图表实例

    // --- 预加载图片以提速 ---
    function preloadImages() {
        // 这一版没有核心图片，但保留逻辑供未来扩展
    }
    preloadImages();

    function startTest() {
        document.getElementById('page-cover').classList.add('hidden');
        document.getElementById('page-quiz').classList.remove('hidden');
        renderQuiz();
    }

    function renderQuiz() {
        const item = quizData[currentStep];
        document.getElementById('progress-num').innerText = (currentStep + 1).toString().padStart(2, '0');
        document.getElementById('quiz-tag').innerText = item.tag;
        document.getElementById('question-text').innerText = item.q;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        item.options.forEach(opt => {
            const div = document.createElement('div');
            div.className = "option-item";
            div.innerHTML = `<span class="opt-letter">${opt.l}</span><span class="opt-text">${opt.t}</span>`;
            div.onclick = () => {
                for(let k in opt.w) scores[k] += opt.w[k];
                currentStep++;
                if(currentStep < quizData.length) renderQuiz();
                else finalize();
            };
            box.appendChild(div);
        });
    }

    function finalize() {
        const { 心智, 能量, 规则 } = scores;
        let id = "01";
        
        // --- 核心映射算法 1.1 ---
        if (心智 >= 8) { // 极高理性
            if (能量 <= 0) id = "02"; // 剔骨刀
            else id = "06"; // 计算器
        } else if (心智 >= 3) { // 理性偏高
            if (规则 >= 5) id = "04"; // 幕后推手
            else id = "01"; // 黑天鹅
        } else if (心智 >= -2) { // 中心智
            if (能量 >= 8) id = "05"; // 野心家
            else if (规则 >= 5) id = "07"; // 护城河
            else id = "09"; // 调停人
        } else { // 感性偏高
            if (能量 >= 5) id = "03"; // 独行侠
            else id = "08"; // 变色龙
        }

        const d = DPTI_DB[id];
        document.getElementById('res-name').innerText = d.name;
        document.getElementById('res-ename').innerText = d.ename;
        document.getElementById('res-dark-index').innerText = d.dIndex;
        document.getElementById('res-tagline').innerText = d.tagline;
        document.getElementById('res-core').innerText = d.core;
        document.getElementById('res-labels').innerText = d.labels;
        document.getElementById('res-pros').innerText = d.pros;
        document.getElementById('res-cons').innerText = d.cons;
        document.getElementById('res-history').innerText = d.history;
        document.getElementById('res-partner').innerText = d.partner;
        document.getElementById('res-enemy').innerText = d.enemy;

        // 切换页面
        document.getElementById('page-quiz').classList.add('hidden');
        document.getElementById('page-result').classList.remove('hidden');
        window.scrollTo(0,0);

        // --- 初始化雷达图 ---
        // 为了确保截图时图表已渲染，我们需要在页面可见后立即绘制
        // 并给 html2canvas 预留一点时间
        renderRadarChart(d.chart);
    }

    // --- 雷达图绘制逻辑 ---
    function renderRadarChart(dataValues) {
        const ctx = document.getElementById('myChart').getContext('2d');
        
        if(myRadarChart) {
            myRadarChart.destroy(); // 如果已有实例，先销毁
        }

        myRadarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['权力嗅觉', '洗脑指数', '冷血程度', '背叛成本', '社交伪装'],
                datasets: [{
                    label: '阴暗维度 Profling',
                    data: dataValues, // 对应 DPTI_DB 中的 chart 数据
                    fill: true,
                    backgroundColor: 'rgba(0, 0, 0, 0.1)', // 哑光灰填充
                    borderColor: '#000000', // 纯黑线条
                    pointBackgroundColor: '#000000',
                    pointBorderColor: '#fff',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: '#000000',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true, // 保持比例
                aspectRatio: 1, // 正方形
                animation: false, // ***重要：关闭动画以确保存取报告时截图完整***
                elements: {
                    line: { tension: 0.1 } // 轻微弯曲
                },
                scales: {
                    r: {
                        angleLines: { display: true, color: '#eee' },
                        suggestedMin: 0,
                        suggestedMax: 100,
                        ticks: { display: false, stepSize: 20 }, // 隐藏数字刻度
                        pointLabels: {
                            font: {
                                size: 12,
                                family: 'PingFang SC',
                                weight: 'bold'
                            },
                            color: '#333'
                        }
                    }
                },
                plugins: {
                    legend: { display: false } // 隐藏顶部标签
                }
            }
        });
    }

    // --- 智能截图存取交互 ---
    function saveReport() {
        const btn = document.querySelector('.btn-share');
        if (location.protocol === 'file:') {
            alert("请通过在线链接访问以确保存取报告功能正常。");
            return;
        }
        btn.innerText = "档案同步中...";
        
        // 给 Chart.js 预留一点渲染时间，虽然关闭了动画，但稳妥起见
        setTimeout(() => {
            const area = document.getElementById('capture-area');
            html2canvas(area, {
                useCORS: true,
                scale: 2, // 高清
                backgroundColor: "#ffffff",
                logging: false,
                // ***重要：确保 html2canvas 捕获到了 Canvas 元素***
                onclone: (clonedDoc) => {
                    // 这里可以做一些截图前的临时样式调整
                }
            }).then(canvas => {
                const dataUrl = canvas.toDataURL("image/png");
                document.getElementById('preview-image').src = dataUrl;
                document.getElementById('preview-overlay').style.display = 'flex';
                btn.innerText = "存取推演报告 (IMAGE)";
            }).catch(err => {
                console.error(err);
                alert("档案同步异常，请刷新重试");
                btn.innerText = "存取推演报告 (IMAGE)";
            });
        }, 300); // 延迟 300ms 截图
    }

    function closePreview() {
        document.getElementById('preview-overlay').style.display = 'none';
    }
</script>
