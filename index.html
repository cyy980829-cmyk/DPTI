            { t: "顺杆而上：回复“当然”，但在输入时你已经在思考如何利用这段旧情为自己攫取新权力。", l: "A", w: {心智:3, 能量:2, 规则:-1} },
            { t: "彻底切割：从此之后，她只是你向上爬的资源，或是你必须防范的假想敌。", l: "B", w: {心智:2, 能量:-2, 规则:1} },
            { t: "强烈反胃：这种背叛感让你想吐，你已经开始物色下一个比她更强的主子。", l: "C", w: {心智:-1, 能量:1, 规则:-1} },
            { t: "甚至欣慰：真心地为她高兴，并准备好在接下来的工作中为她挡掉所有的明枪暗箭。", l: "D", w: {心智:-3, 能量:-2, 规则:2} }
        ]},
        { tag: "欲望的背叛", q: "竞争对手私下联系你，只要你能在竞标中“不小心”发错一个文件，就给你这辈子都赚不到的巨额佣金。你会？", options: [
            { t: "极限博弈：回复对方说这点钱不够，你想要的是对方公司的一个合伙人席位。", l: "A", w: {心智:3, 能量:2, 规则:-2} },
            { t: "职业洁癖：这种低智商的诱惑是对你顶级玩家身份的侮辱，你反手就把他举报了。", l: "B", w: {心智:2, 能量:-1, 规则:2} },
            { t: "毫无底线：忠诚只是因为背叛的筹码不够。现在筹码够了，你可以演得像个英雄。", l: "C", w: {心智:-2, 能量:3, 规则:-3} },
            { t: "胆怯的贪婪：你不敢做，但接下来的每一秒你都在为错过了这笔钱而深深懊悔。", l: "D", w: {心智:0, 能量:-2, 规则:2} }
        ]},
        { tag: "秩序的废墟", q: "深夜在写字楼修改PPT。看着空荡荡的走廊，你想：如果这一刻整座大楼的电力逻辑由你主宰，你会？", options: [
            { t: "“控制”：调暗所有人的光，让这个写字楼里的人都在你的节奏中窒息般地卷起来。", l: "A", w: {心智:-1, 能量:3, 规则:2} },
            { t: "“观测”：站在高处复盘，谁才是这满地工蚁中最适合被献祭的那个替死鬼？", l: "B", w: {心智:3, 能量:-1, 规则:0} },
            { t: "“彻底离线”：想立刻注销所有账号，用这辈子的“缺席”来嘲讽这一套吃人的体系。", l: "C", w: {心智:-3, 能量:2, 规则:-3} },
            { t: "“价值最大化”：与其感性，不如思考如何利用这种深夜加班的惨状去谈个更好的补偿包。", l: "D", w: {心智:2, 能量:-2, 规则:2} }
        ]},
        { tag: "杀掉那个天真", q: "如果能穿越回领入职礼包的那天，亲手杀掉那个相信“努力就有回报”的自己，你会选在哪个瞬间？", options: [
            { t: "她在第一次因为项目荣誉熬通宵、却被领导致谢词里抹去名字的时刻。", l: "A", w: {心智:3, 能量:-1, 规则:1} },
            { t: "她在第一次领到微薄薪水，还舍得给全组买下午茶分享快乐的时刻。", l: "B", w: {心智:-2, 能量:2, 规则:-1} },
            { t: "她在第一次天真地对 HR 说出“我热爱这份工作”的时刻。", l: "C", w: {心智:2, 能量:-2, 规则:1} },
            { t: "就在此时此刻，让她彻底消失在这一场漫长且绝望的权力推演里。", l: "D", w: {心智:1, 能量:1, 规则:-2} }
        ]},
        { tag: "博弈的残忍", q: "项目出大祸，你明明有办法止损，但如果不止损，你最讨厌的那个竞争对手就会被当场开除。你会？", options: [
            { t: "借刀杀人：假装努力止损但“功亏一翼”，微笑着目送他收拾东西滚蛋。", l: "A", w: {心智:3, 能量:1, 规则:-2} },
            { t: "绝对理性：为了全局利益救他一命，但从此让他欠下你一辈子还不起的债。", l: "B", w: {心智:2, 能量:-1, 规则:2} },
            { t: "看着他死：牺牲公司的利益去换取私仇的快感，这笔账在你心里很划算。", l: "C", w: {心智:-2, 能量:3, 规则:-3} },
            { t: "惊慌失措：因为害怕承担责任而陷入瘫痪，只能眼睁睁看着一切滑向深渊。", l: "D", w: {心智:-2, 能量:-3, 规则:2} }
        ]},
        { tag: "权力的代价", q: "当你终于坐进独立的办公室，看着外面那些战战兢兢、为了生计向你低头的下属。你的情绪是？", options: [
            { t: "征服的快感：这就是你牺牲了所有社交、情感和良知才换回来的战利品。", l: "A", w: {心智:-2, 能量:3, 规则:2} },
            { t: "极度的清醒：这种孤独是效率的勋章，弱者才需要所谓的“团队温情”。", l: "B", w: {心智:3, 能量:-1, 规则:1} },
            { t: "某种虚无：你虽然成了主宰者，但发现自己也不过是更高一级权力的囚徒。", l: "C", w: {心智:1, 能量:2, 规则:-2} },
            { t: "假装和蔼：为了更方便地收割他们的价值，你披上了一层名为“导师”的伪善外衣。", l: "D", w: {心智:2, 能量:1, 规则:-1} }
        ]}
    ];

    let currentStep = 0;
    let scores = { 心智: 0, 能量: 0, 规则: 0 };
    let radarChart = null;

    function startTest() {
        if(typeof gtag === 'function'){ gtag('event', 'start_quiz'); }
        document.getElementById('page-cover').classList.add('hidden');
        document.getElementById('page-quiz').classList.remove('hidden');
        renderQuiz();
    }

    function renderQuiz() {
        const item = quizData[currentStep];
        document.getElementById('progress-num').innerText = (currentStep + 1).toString().padStart(2, '0');
        document.getElementById('quiz-tag').innerText = item.tag || "ARCHIVING"; // 关键修正：确保 tag 存在
        document.getElementById('question-text').innerText = item.q;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        item.options.forEach(opt => {
            const div = document.createElement('div');
            div.className = "option-item";
            div.innerHTML = `<span class="opt-letter">${opt.l}</span><span class="opt-text">${opt.t}</span>`;
            div.onclick = () => {
                for(let k in opt.w) scores[k] += opt.w[k];
                currentStep++;
                if(currentStep < quizData.length) renderQuiz();
                else finalize();
            };
            box.appendChild(div);
        });
    }

    function finalize() {
        const { 心智, 能量, 规则 } = scores;
        let id = "01";
        // 核心映射算法稳定版
        if (心智 >= 8) { id = (能量 <= 0) ? "02" : "06"; }
        else if (心智 >= 3) { id = (规则 >= 5) ? "04" : "01"; }
        else if (心智 >= -2) { 
            if (能量 >= 8) id = "05"; 
            else if (规则 >= 5) id = "07"; 
            else id = "09"; 
        } else { 
            id = (能量 >= 5) ? "03" : "08"; 
        }

        const d = DPTI_DB[id];
        // 填充结果数据
        document.getElementById('res-name').innerText = d.name;
        document.getElementById('res-ename').innerText = d.ename;
        document.getElementById('res-avatar-img').src = d.img;
        document.getElementById('res-dark-index').innerText = d.dIndex;
        document.getElementById('res-tagline').innerText = d.tagline;
        document.getElementById('res-core').innerText = d.core;
        document.getElementById('res-labels').innerText = d.labels;
        document.getElementById('res-pros').innerText = d.pros;
        document.getElementById('res-cons').innerText = d.cons;
        document.getElementById('res-history').innerText = d.history;
        document.getElementById('res-p-name').innerText = d.pName;
        document.getElementById('res-p-desc').innerText = d.pDesc;
        document.getElementById('res-e-name').innerText = d.eName;
        document.getElementById('res-e-desc').innerText = d.eDesc;

        const rarity = (Math.random() * 1.5 + (8 / (Math.abs(心智) + 1))).toFixed(1);
        document.getElementById('res-rarity').innerText = `稀有度 ${rarity}%`;

        document.getElementById('page-quiz').classList.add('hidden');
        document.getElementById('page-result').classList.remove('hidden');
        window.scrollTo(0,0);
        renderChart(d.chart);
    }

    function renderChart(data) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if(radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['权力嗅觉', '洗脑指数', '冷血程度', '背叛成本', '社交伪装'],
                datasets: [{
                    data: data,
                    backgroundColor: 'rgba(0, 0, 0, 0.05)',
                    borderColor: '#000',
                    borderWidth: 2,
                    pointBackgroundColor: '#000'
                }]
            },
            options: {
                animation: false,
                scales: { r: { suggestedMin: 0, suggestedMax: 100, ticks: { display: false } } },
                plugins: { legend: { display: false } }
            }
        });
    }

    function saveReport() {
        if(typeof gtag === 'function'){ gtag('event', 'generate_report', {'result': document.getElementById('res-name').innerText}); }
        const btn = document.querySelector('.btn-start[onclick^="saveReport"]');
        btn.innerText = "正在同步档案...";
        setTimeout(() => {
            html2canvas(document.getElementById('capture-area'), { useCORS: true, scale: 2 }).then(canvas => {
                document.getElementById('preview-image').src = canvas.toDataURL("image/png");
                document.getElementById('preview-overlay').style.display = 'flex';
                btn.innerText = "生成报告长图";
            });
        }, 500);
    }
    function closePreview() { document.getElementById('preview-overlay').style.display = 'none'; }
</script>
